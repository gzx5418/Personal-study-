<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智学助手 - 高等教育个性化学习智能体系统</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/profile.css">
  <link rel="stylesheet" href="css/resources.css">
  <link rel="stylesheet" href="css/path.css">
  <link rel="stylesheet" href="css/tutor.css?v=md3">
  <link rel="stylesheet" href="css/evaluation.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
</head>
<body>
  <header class="app-header">
    <div class="header-brand">
      <div class="header-brand-icon">智</div>
      <span>智学助手</span>
    </div>
    <nav class="header-nav" aria-label="主导航">
      <a href="#dashboard" data-nav="dashboard" class="nav-link is-active">首页</a>
      <a href="#profile" data-nav="profile" class="nav-link">学习画像</a>
      <a href="#resources" data-nav="resources" class="nav-link">资源中心</a>
      <a href="#path" data-nav="path" class="nav-link">学习路径</a>
      <a href="#evaluation" data-nav="evaluation" class="nav-link">学习评估</a>
      <a href="#tutor" data-nav="tutor" class="nav-link">智能辅导</a>
    </nav>
    <div class="header-user">
      <select id="courseSelector" style="margin-right:8px;padding:5px 10px;border:1px solid oklch(0.88 0.01 80);border-radius:var(--radius-full);font-size:var(--text-xs);background:oklch(0.94 0.01 78 / 0.5);color:var(--color-ink);font-weight:500;letter-spacing:0.02em">
        <option value="python_programming">Python程序设计</option>
      </select>
      <div class="header-avatar">学</div>
      <span>学生用户</span>
    </div>
  </header>

  <main class="app-viewport">
    <section id="module-dashboard" class="module" data-route="dashboard"></section>
    <section id="module-profile" class="module" data-route="profile"></section>
    <section id="module-resources" class="module" data-route="resources"></section>
    <section id="module-path" class="module" data-route="path"></section>
    <section id="module-evaluation" class="module" data-route="evaluation"></section>
    <section id="module-tutor" class="module" data-route="tutor"></section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.0/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx-preview@0.3.3/dist/docx-preview.min.js"></script>
  <script src="js/utils/dom.js"></script>
  <script src="js/api.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/profile.js?v=fix2"></script>
  <script src="js/modules/resources.js?v=del1"></script>
  <script src="js/modules/path.js"></script>
  <script src="js/modules/evaluation.js"></script>
  <script src="js/modules/tutor.js?v=file1"></script>
  <script>
    if (typeof marked !== 'undefined') {
      marked.setOptions({
        highlight: function(code, lang) {
          if (typeof hljs !== 'undefined' && lang && hljs.getLanguage(lang)) {
            return hljs.highlight(code, { language: lang }).value;
          }
          return code;
        },
        breaks: true,
        gfm: true,
      });
    }
    if (typeof mermaid !== 'undefined') {
      mermaid.initialize({ startOnLoad: false, theme: 'default' });
    }

    // Course selector init
    (async () => {
      try {
        await Api.init();
        const data = await Api.getCourses();
        const sel = document.getElementById('courseSelector');
        if (sel && data.courses) {
          sel.innerHTML = data.courses.map(c =>
            `<option value="${c.id}" ${c.id === AppState.currentCourseId ? 'selected' : ''}>${c.name}</option>`
          ).join('');
          if (data.current && !AppState.currentCourseId) AppState.setCourseId(data.current);
          sel.addEventListener('change', () => {
            AppState.setCourseId(sel.value);
            // Re-render current page with new course
            App._rendered = {};
            App.current = null;
            App.route();
          });
        }
      } catch (e) { console.error('Failed to load courses:', e); }
    })();
  </script>
</body>
</html>
