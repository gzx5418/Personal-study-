<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智学助手 - 高等教育个性化学习智能体系统</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/profile.css">
  <link rel="stylesheet" href="css/resources.css">
  <link rel="stylesheet" href="css/path.css">
  <link rel="stylesheet" href="css/tutor.css?v=md4">
  <link rel="stylesheet" href="css/evaluation.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
</head>
<body>
  <header class="app-header">
    <button class="header-menu-btn" id="menuToggle" aria-label="菜单" aria-expanded="false">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="header-brand">
      <div class="header-brand-icon">智</div>
      <span>智学助手</span>
    </div>
    <nav class="header-nav" id="headerNav" aria-label="主导航">
      <a href="#dashboard" data-nav="dashboard" class="nav-link is-active">首页</a>
      <a href="#profile" data-nav="profile" class="nav-link">学习画像</a>
      <a href="#resources" data-nav="resources" class="nav-link">资源中心</a>
      <a href="#path" data-nav="path" class="nav-link">学习路径</a>
      <a href="#evaluation" data-nav="evaluation" class="nav-link">学习评估</a>
      <a href="#tutor" data-nav="tutor" class="nav-link">智能辅导</a>
    </nav>
    <div class="header-nav-overlay" id="navOverlay"></div>
    <div class="header-user">
      <select id="courseSelector" class="header-user-select">
        <option value="python_programming">Python程序设计</option>
      </select>
      <div class="header-avatar">学</div>
      <span>学生用户</span>
    </div>
  </header>

  <main class="app-viewport">
    <section id="module-dashboard" class="module" data-route="dashboard"></section>
    <section id="module-profile" class="module" data-route="profile"></section>
    <section id="module-resources" class="module" data-route="resources"></section>
    <section id="module-path" class="module" data-route="path"></section>
    <section id="module-evaluation" class="module" data-route="evaluation"></section>
    <section id="module-tutor" class="module" data-route="tutor"></section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js" integrity="sha384-3zf4Pen4fXU90jGg3cxmo7BF4dq8HMtF2s07c/Hhd1Fh+Encm6ApPvNm8vrMJbWu" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" integrity="sha384-F/bZzf7p3Joyp5psL90p/p89AZJsndkSoGwRpXcZhleCWhd8SnRuoYo4d0yirjJp" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js" integrity="sha384-FWJTgPmIGm1+zpNhubuHRC/ulS1UK7hAZ7qiUUmKD8yGfPcn5ZXYBd2qRgi6L8Tu" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.0/mermaid.min.js" integrity="sha384-6F4Ibv/ylL12O35KFWTeGTHuBKDz5L6yjKsgv3QHQ8s4NTqlDXq7kMlYXGs7MHFc" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" integrity="sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx-preview@0.3.3/dist/docx-preview.min.js" integrity="sha384-s/vTi3qXvt33gUqVDnRUSa35s/ktzUQGMKTIiGHXHx55PJ8MHQ3561te3qd7tT6P" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" integrity="sha384-+VfUPEb0PdtChMwmBcBmykRMDd+v6D/oFmB3rZM/puCMDYcIvF968OimRh4KQY9a" crossorigin="anonymous"></script>
  <script src="js/utils/dom.js"></script>
  <script src="js/api.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/profile.js?v=fix2"></script>
  <script src="js/modules/resources.js?v=del1"></script>
  <script src="js/modules/path.js"></script>
  <script src="js/modules/evaluation.js"></script>
  <script src="js/modules/tutor.js?v=file2"></script>
  <script>
    if (typeof marked !== 'undefined') {
      marked.setOptions({
        highlight: function(code, lang) {
          if (typeof hljs !== 'undefined' && lang && hljs.getLanguage(lang)) {
            return hljs.highlight(code, { language: lang }).value;
          }
          return code;
        },
        breaks: true,
        gfm: true,
        sanitize: false,
      });
    }
    if (typeof mermaid !== 'undefined') {
      mermaid.initialize({ startOnLoad: false, theme: 'default' });
    }

    // Course selector init
    (async () => {
      try {
        await Api.init();
        const data = await Api.getCourses();
        const sel = document.getElementById('courseSelector');
        if (sel && data.courses) {
          sel.innerHTML = data.courses.map(c =>
            `<option value="${escapeHtml(c.id)}" ${c.id === AppState.currentCourseId ? 'selected' : ''}>${escapeHtml(c.name)}</option>`
          ).join('');
          if (data.current && !AppState.currentCourseId) AppState.setCourseId(data.current);
          sel.addEventListener('change', () => {
            AppState.setCourseId(sel.value);
            // Re-render current page with new course
            App._rendered = {};
            App.current = null;
            App.route();
          });
        }
      } catch (e) { console.error('Failed to load courses:', e); }
    })();
  </script>
</body>
</html>
